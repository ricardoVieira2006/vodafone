<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organizador de Vendas Vodafone</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7fa; color: #333; line-height: 1.6; padding: 20px; }
        .container { max-width: 1200px; margin: auto; }
        header { background: linear-gradient(135deg, #e60000, #ff4444); color: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        header h1 { font-size: 1.5rem; }
        .btn { background: white; color: #e60000; border: none; padding: 12px 20px; border-radius: 25px; font-weight: bold; cursor: pointer; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .search-section { margin-bottom: 20px; }
        #searchInput { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 1rem; }
        .table-container { background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f8f9fa; font-weight: 600; }
        .estado-select { padding: 6px 10px; border-radius: 20px; border: 2px solid #ddd; font-weight: bold; }
        .estado-pendente { background: #fff3cd; color: #856404; }
        .estado-vendido { background: #d4edda; color: #155724; }
        .estado-recusado { background: #f8d7da; color: #721c24; }
        .photo-thumbs img { width: 40px; height: 40px; object-fit: cover; border-radius: 4px; cursor: pointer; margin-right: 5px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal-content { background: white; padding: 30px; border-radius: 15px; width: 90%; max-width: 500px; }
        .close { float: right; font-size: 2rem; cursor: pointer; }
        input, textarea { width: 100%; padding: 10px; margin: 10px 0; border: 2px solid #ddd; border-radius: 8px; }
        .form-actions { display: flex; gap: 10px; margin-top: 20px; }
        .form-actions button { flex: 1; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-success { background: #28a745; color: white; }
        .btn-cancel { background: #6c757d; color: white; }
        .diagnostico { margin: 20px 0; padding: 10px; background: #eee; border-radius: 8px; }
        @media (max-width: 768px) {
            th, td { padding: 8px; font-size: 0.9rem; }
            .modal-content { width: 95%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 Vendas Vodafone</h1>
            <div>
                <button class="btn" id="addBtn">+ Nova Proposta</button>
                <button class="btn" id="testStorageBtn" style="background:#ffc107; color:#333; margin-left:10px;">🧪 Testar Armazenamento</button>
            </div>
        </header>

        <div class="search-section">
            <input type="text" id="searchInput" placeholder="🔍 Buscar cliente...">
        </div>

        <div id="diagnostico" class="diagnostico" style="display:none;"></div>

        <div class="table-container">
            <table id="salesTable">
                <thead>
                    <tr>
                        <th>Cliente</th>
                        <th>Pacote</th>
                        <th>Preço</th>
                        <th>Comissão</th>
                        <th>IBAN</th>
                        <th>Fotos</th>
                        <th>Estado</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody id="salesBody"></tbody>
                <tfoot id="summaryRow" style="display:none;">
                    <tr>
                        <td colspan="6" style="text-align:right;">
                            <span style="margin-right:20px;">🔵 Total geral: <strong id="totalGeral">0.00 €</strong></span>
                            <span>🟢 Total vendido: <strong id="totalVendido">0.00 €</strong></span>
                        </td>
                        <td colspan="2"></td>
                    </tr>
                </tfoot>
            </table>
        </div>
    </div>

    <!-- Modal -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2 id="modalTitle">Nova Proposta</h2>
            <form id="salesForm">
                <label>Nome do Cliente:</label>
                <input type="text" id="clientName" required>
                <label>Pacote/Descrição:</label>
                <textarea id="packageDesc" required></textarea>
                <label>Preço (€):</label>
                <input type="number" id="price" step="0.01" required>
                <label>IBAN:</label>
                <input type="text" id="iban" required>
                <label>Foto Cartão Cidadão:</label>
                <input type="file" id="idPhoto" accept="image/*">
                <img id="idPhotoPreview" style="max-width:150px; display:none;">
                <label>Fatura NOS:</label>
                <input type="file" id="nosBill" accept="image/*">
                <img id="nosBillPreview" style="max-width:150px; display:none;">
                <div class="form-actions">
                    <button type="submit" class="btn-success">Guardar</button>
                    <button type="button" class="btn-cancel" id="cancelBtn">Cancelar</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        (function() {
            // ---------- Estado ----------
            let sales = [];
            const STORAGE_KEY = 'vodafone_sales_data';

            // Elementos do DOM
            const addBtn = document.getElementById('addBtn');
            const searchInput = document.getElementById('searchInput');
            const salesBody = document.getElementById('salesBody');
            const summaryRow = document.getElementById('summaryRow');
            const totalGeral = document.getElementById('totalGeral');
            const totalVendido = document.getElementById('totalVendido');
            const modal = document.getElementById('modal');
            const salesForm = document.getElementById('salesForm');
            const closeBtn = document.querySelector('.close');
            const cancelBtn = document.getElementById('cancelBtn');
            const modalTitle = document.getElementById('modalTitle');
            const testStorageBtn = document.getElementById('testStorageBtn');
            const diagnosticoDiv = document.getElementById('diagnostico');

            const clientName = document.getElementById('clientName');
            const packageDesc = document.getElementById('packageDesc');
            const price = document.getElementById('price');
            const iban = document.getElementById('iban');
            const idPhotoInput = document.getElementById('idPhoto');
            const nosBillInput = document.getElementById('nosBill');
            const idPhotoPreview = document.getElementById('idPhotoPreview');
            const nosBillPreview = document.getElementById('nosBillPreview');

            let currentEditIndex = -1;

            // ---------- Persistência ----------
            function loadData() {
                try {
                    const data = localStorage.getItem(STORAGE_KEY);
                    if (data) {
                        sales = JSON.parse(data);
                        // garantir estado padrão
                        sales.forEach(s => { if (!s.estado) s.estado = 'Pendente'; });
                    }
                } catch (e) {
                    sales = [];
                }
            }

            function saveData() {
                try {
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(sales));
                } catch (e) {
                    alert('Erro ao guardar: armazenamento cheio.');
                }
            }

            function calcularComissao(preco) {
                return (parseFloat(preco) + 5) * 2;
            }

            // ---------- Render (seguro, sem innerHTML para dados) ----------
            function renderTable() {
                salesBody.innerHTML = '';
                const termo = searchInput.value.toLowerCase().trim();
                const filtradas = termo ? sales.filter(v => v.clientName.toLowerCase().includes(termo)) : sales;

                if (filtradas.length === 0) {
                    const tr = document.createElement('tr');
                    tr.innerHTML = '<td colspan="8" style="text-align:center;">Nenhuma proposta encontrada.</td>';
                    salesBody.appendChild(tr);
                } else {
                    filtradas.forEach(venda => {
                        const idxGlobal = sales.indexOf(venda);
                        const comissao = calcularComissao(venda.price);
                        const tr = document.createElement('tr');

                        // Cliente
                        const tdCliente = document.createElement('td');
                        tdCliente.textContent = venda.clientName;
                        tr.appendChild(tdCliente);
                        // Pacote
                        const tdPacote = document.createElement('td');
                        tdPacote.textContent = venda.packageDesc;
                        tr.appendChild(tdPacote);
                        // Preço
                        const tdPreco = document.createElement('td');
                        tdPreco.textContent = '€' + parseFloat(venda.price).toFixed(2);
                        tr.appendChild(tdPreco);
                        // Comissão
                        const tdComissao = document.createElement('td');
                        tdComissao.innerHTML = '<strong>€' + comissao.toFixed(2) + '</strong>';
                        tr.appendChild(tdComissao);
                        // IBAN
                        const tdIban = document.createElement('td');
                        tdIban.textContent = venda.iban.slice(0,4) + '...' + venda.iban.slice(-4);
                        tr.appendChild(tdIban);
                        // Fotos
                        const tdFotos = document.createElement('td');
                        const divFotos = document.createElement('div');
                        divFotos.className = 'photo-thumbs';
                        if (venda.idPhoto) {
                            const img = document.createElement('img');
                            img.src = venda.idPhoto;
                            img.addEventListener('click', () => abrirImagem(venda.idPhoto));
                            divFotos.appendChild(img);
                        }
                        if (venda.nosBill) {
                            const img = document.createElement('img');
                            img.src = venda.nosBill;
                            img.addEventListener('click', () => abrirImagem(venda.nosBill));
                            divFotos.appendChild(img);
                        }
                        tdFotos.appendChild(divFotos);
                        tr.appendChild(tdFotos);
                        // Estado
                        const tdEstado = document.createElement('td');
                        const select = document.createElement('select');
                        select.className = 'estado-select';
                        select.dataset.index = idxGlobal;
                        ['Pendente', 'Vendido', 'Recusado'].forEach(est => {
                            const opt = document.createElement('option');
                            opt.value = est;
                            opt.textContent = est === 'Pendente' ? '⏳ Pendente' : (est === 'Vendido' ? '✅ Vendido' : '❌ Recusado');
                            if (venda.estado === est) opt.selected = true;
                            select.appendChild(opt);
                        });
                        select.addEventListener('change', function() {
                            sales[this.dataset.index].estado = this.value;
                            saveData();
                            renderTable();
                        });
                        tdEstado.appendChild(select);
                        tr.appendChild(tdEstado);
                        // Ações
                        const tdAcoes = document.createElement('td');
                        const btnEdit = document.createElement('button');
                        btnEdit.textContent = '✏️';
                        btnEdit.className = 'action-btn';
                        btnEdit.addEventListener('click', () => editarVenda(idxGlobal));
                        const btnDel = document.createElement('button');
                        btnDel.textContent = '🗑️';
                        btnDel.className = 'action-btn';
                        btnDel.addEventListener('click', () => eliminarVenda(idxGlobal));
                        tdAcoes.appendChild(btnEdit);
                        tdAcoes.appendChild(btnDel);
                        tr.appendChild(tdAcoes);

                        salesBody.appendChild(tr);
                    });
                }

                // Totais
                const totalG = sales.reduce((s, v) => s + calcularComissao(v.price), 0);
                const totalV = sales.filter(v => v.estado === 'Vendido').reduce((s, v) => s + calcularComissao(v.price), 0);
                totalGeral.textContent = totalG.toFixed(2) + ' €';
                totalVendido.textContent = totalV.toFixed(2) + ' €';
                summaryRow.style.display = sales.length ? 'table-row' : 'none';
            }

            // ---------- Modal ----------
            function abrirModal(indice) {
                currentEditIndex = indice;
                modal.classList.add('active');
                modalTitle.textContent = indice === -1 ? 'Nova Proposta' : 'Editar Proposta';
                salesForm.reset();
                idPhotoPreview.style.display = 'none';
                nosBillPreview.style.display = 'none';
                if (indice > -1) {
                    const v = sales[indice];
                    clientName.value = v.clientName;
                    packageDesc.value = v.packageDesc;
                    price.value = v.price;
                    iban.value = v.iban;
                    if (v.idPhoto) { idPhotoPreview.src = v.idPhoto; idPhotoPreview.style.display = 'block'; }
                    if (v.nosBill) { nosBillPreview.src = v.nosBill; nosBillPreview.style.display = 'block'; }
                }
            }

            function fecharModal() {
                modal.classList.remove('active');
                currentEditIndex = -1;
            }

            // ---------- Compressão de imagem ----------
            function comprimirImagem(file, previewImg) {
                return new Promise(resolve => {
                    if (!file) return resolve(null);
                    const reader = new FileReader();
                    reader.onload = e => {
                        const img = new Image();
                        img.onload = () => {
                            const MAX_WIDTH = 400;
                            let width = img.width, height = img.height;
                            if (width > MAX_WIDTH) {
                                height *= MAX_WIDTH / width;
                                width = MAX_WIDTH;
                            }
                            const canvas = document.createElement('canvas');
                            canvas.width = width;
                            canvas.height = height;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0, width, height);
                            const dataUrl = canvas.toDataURL('image/jpeg', 0.7);
                            previewImg.src = dataUrl;
                            previewImg.style.display = 'block';
                            resolve(dataUrl);
                        };
                        img.src = e.target.result;
                    };
                    reader.readAsDataURL(file);
                });
            }

            async function handleIdPhoto(e) {
                e.target._dataUrl = await comprimirImagem(e.target.files[0], idPhotoPreview);
            }
            async function handleNosBill(e) {
                e.target._dataUrl = await comprimirImagem(e.target.files[0], nosBillPreview);
            }

            // ---------- Submeter ----------
            async function handleSubmit(e) {
                e.preventDefault();
                const idPhoto = idPhotoInput._dataUrl || (currentEditIndex > -1 ? sales[currentEditIndex].idPhoto : null);
                const nosBill = nosBillInput._dataUrl || (currentEditIndex > -1 ? sales[currentEditIndex].nosBill : null);

                const nova = {
                    clientName: clientName.value.trim(),
                    packageDesc: packageDesc.value.trim(),
                    price: price.value,
                    iban: iban.value.trim(),
                    idPhoto: idPhoto || null,
                    nosBill: nosBill || null,
                    estado: currentEditIndex > -1 ? sales[currentEditIndex].estado : 'Pendente'
                };

                if (currentEditIndex === -1) {
                    sales.unshift(nova);
                } else {
                    sales[currentEditIndex] = nova;
                }

                saveData();
                renderTable();
                fecharModal();
                idPhotoInput._dataUrl = undefined;
                nosBillInput._dataUrl = undefined;
            }

            function editarVenda(idx) { abrirModal(idx); }
            function eliminarVenda(idx) {
                if (confirm('Eliminar esta proposta?')) {
                    sales.splice(idx, 1);
                    saveData();
                    renderTable();
                }
            }

            function abrirImagem(src) {
                const div = document.createElement('div');
                div.style.cssText = 'position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); display:flex; align-items:center; justify-content:center; z-index:2000;';
                div.innerHTML = `<span style="position:fixed; top:20px; right:30px; color:white; font-size:3rem; cursor:pointer;">&times;</span>
                                 <img src="${src}" style="max-width:90%; max-height:90%;">`;
                div.querySelector('span').addEventListener('click', () => div.remove());
                document.body.appendChild(div);
            }

            // ---------- Diagnóstico ----------
            function testarArmazenamento() {
                diagnosticoDiv.style.display = 'block';
                try {
                    const testKey = '__test_voda__';
                    localStorage.setItem(testKey, 'ok');
                    localStorage.removeItem(testKey);
                    diagnosticoDiv.innerHTML = '✅ <strong>Armazenamento funciona!</strong> Pode guardar dados.';
                    diagnosticoDiv.style.background = '#d4edda';
                } catch (e) {
                    diagnosticoDiv.innerHTML = '❌ <strong>Erro no armazenamento:</strong> ' + e.message + '<br>Tente limpar os dados do navegador ou use outro browser.';
                    diagnosticoDiv.style.background = '#f8d7da';
