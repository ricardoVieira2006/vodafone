<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organizador de Vendas Vodafone</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7fa; color: #333; line-height: 1.6; }
        .container { max-width: 1200px; margin: auto; padding: 20px; }
        header { background: linear-gradient(135deg, #e60000, #ff4444); color: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
        header h1 { font-size: 1.5rem; }
        .btn { background: white; color: #e60000; border: none; padding: 12px 20px; border-radius: 25px; font-weight: bold; cursor: pointer; transition: all 0.2s; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .btn-warning { background: #ffc107; color: #333; }
        .search-section { margin-bottom: 20px; }
        #searchInput { width: 100%; padding: 12px 15px; border: 2px solid #ddd; border-radius: 8px; font-size: 1rem; }
        #searchInput:focus { border-color: #e60000; outline: none; }
        .table-container { background: white; border-radius: 10px; overflow-x: auto; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f8f9fa; font-weight: 600; color: #555; text-transform: uppercase; font-size: 0.9rem; }
        .estado-select { padding: 6px 10px; border-radius: 20px; border: 2px solid #ddd; font-weight: bold; font-size: 0.9rem; cursor: pointer; }
        .estado-pendente { background: #fff3cd; color: #856404; border-color: #ffc107; }
        .estado-vendido { background: #d4edda; color: #155724; border-color: #28a745; }
        .estado-recusado { background: #f8d7da; color: #721c24; border-color: #dc3545; }
        .photo-thumbs { display: flex; gap: 5px; flex-wrap: wrap; }
        .photo-thumbs img { width: 40px; height: 40px; object-fit: cover; border-radius: 4px; border: 2px solid #ddd; cursor: pointer; }
        .action-btn { background: none; border: none; cursor: pointer; font-size: 1.2rem; padding: 5px; border-radius: 4px; }
        .edit-btn { color: #007bff; }
        .delete-btn { color: #dc3545; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal-content { background: white; padding: 30px; border-radius: 15px; width: 90%; max-width: 500px; position: relative; }
        .close { position: absolute; top: 15px; right: 20px; font-size: 2rem; cursor: pointer; color: #999; }
        .close:hover { color: #333; }
        input, textarea { width: 100%; padding: 10px; margin: 10px 0; border: 2px solid #ddd; border-radius: 8px; font-size: 1rem; }
        input:focus, textarea:focus { border-color: #e60000; outline: none; }
        textarea { height: 80px; resize: vertical; }
        .form-actions { display: flex; gap: 10px; margin-top: 20px; }
        .form-actions button { flex: 1; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: all 0.2s; }
        .btn-success { background: #28a745; color: white; }
        .btn-cancel { background: #6c757d; color: white; }
        .diagnostico { background: #eee; padding: 10px; border-radius: 8px; margin-bottom: 20px; display: none; }
        @media (max-width: 768px) {
            table { min-width: 100%; }
            thead { display: none; }
            tr { display: block; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 10px; padding: 15px; background: white; }
            td { display: block; text-align: right; padding: 8px 0; border: none; position: relative; }
            td::before { content: attr(data-label); float: left; font-weight: bold; color: #555; text-transform: uppercase; font-size: 0.8rem; }
            .photo-thumbs { justify-content: flex-end; }
            tfoot tr { display: flex; justify-content: space-between; align-items: center; }
            tfoot td { display: block; padding: 10px; }
            tfoot td::before { content: none; }
            .modal-content { width: 95%; margin: auto; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 Vendas Vodafone</h1>
            <div>
                <button class="btn" id="addBtn">+ Nova Proposta</button>
                <button class="btn btn-warning" id="testStorageBtn">🧪 Testar Armazenamento</button>
            </div>
        </header>

        <div id="diagnostico" class="diagnostico"></div>

        <div class="search-section">
            <input type="text" id="searchInput" placeholder="🔍 Buscar cliente...">
        </div>

        <div class="table-container">
            <table id="salesTable">
                <thead>
                    <tr>
                        <th>Cliente</th>
                        <th>Pacote</th>
                        <th>Preço</th>
                        <th>Comissão</th>
                        <th>IBAN</th>
                        <th>Fotos</th>
                        <th>Estado</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody id="salesBody"></tbody>
                <tfoot id="summaryRow" style="display:none;">
                    <tr>
                        <td colspan="6" style="text-align:right;">
                            <span style="margin-right:20px;">🔵 Total geral: <strong id="totalGeral">0.00 €</strong></span>
                            <span>🟢 Total vendido: <strong id="totalVendido">0.00 €</strong></span>
                        </td>
                        <td colspan="2"></td>
                    </tr>
                </tfoot>
            </table>
        </div>
    </div>

    <!-- Modal -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2 id="modalTitle">Nova Proposta</h2>
            <form id="salesForm">
                <label>Nome do Cliente:</label>
                <input type="text" id="clientName" required autocomplete="off">
                <label>Pacote/Descrição:</label>
                <textarea id="packageDesc" required></textarea>
                <label>Preço (€):</label>
                <input type="number" id="price" step="0.01" required>
                <label>IBAN:</label>
                <input type="text" id="iban" required>
                <label>Foto Cartão Cidadão:</label>
                <input type="file" id="idPhoto" accept="image/*">
                <img id="idPhotoPreview" style="max-width:150px; display:none; margin-top:5px; border-radius:8px;">
                <label>Fatura NOS:</label>
                <input type="file" id="nosBill" accept="image/*">
                <img id="nosBillPreview" style="max-width:150px; display:none; margin-top:5px; border-radius:8px;">
                <div class="form-actions">
                    <button type="submit" class="btn-success">Guardar</button>
                    <button type="button" class="btn-cancel" id="cancelBtn">Cancelar</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        (function() {
            // ---------- Estado ----------
            let sales = [];
            const STORAGE_KEY = 'vodafone_sales_data';

            const addBtn = document.getElementById('addBtn');
            const searchInput = document.getElementById('searchInput');
            const salesBody = document.getElementById('salesBody');
            const summaryRow = document.getElementById('summaryRow');
            const totalGeral = document.getElementById('totalGeral');
            const totalVendido = document.getElementById('totalVendido');
            const modal = document.getElementById('modal');
            const salesForm = document.getElementById('salesForm');
            const closeBtn = document.querySelector('.close');
            const cancelBtn = document.getElementById('cancelBtn');
            const modalTitle = document.getElementById('modalTitle');
            const testStorageBtn = document.getElementById('testStorageBtn');
            const diagnosticoDiv = document.getElementById('diagnostico');

            const clientName = document.getElementById('clientName');
            const packageDesc = document.getElementById('packageDesc');
            const price = document.getElementById('price');
            const iban = document.getElementById('iban');
            const idPhotoInput = document.getElementById('idPhoto');
            const nosBillInput = document.getElementById('nosBill');
            const idPhotoPreview = document.getElementById('idPhotoPreview');
            const nosBillPreview = document.getElementById('nosBillPreview');

            let currentEditIndex = -1;

            // ---------- Persistência ----------
            function loadData() {
                try {
                    const data = localStorage.getItem(STORAGE_KEY);
                    if (data) {
                        sales = JSON.parse(data);
                        sales.forEach(s => { if (!s.estado) s.estado = 'Pendente'; });
                    }
                } catch (e) {
                    sales = [];
                    diagnosticoDiv.style.display = 'block';
                    diagnosticoDiv.innerHTML = '⚠️ Dados corrompidos. A lista foi limpa.';
                }
            }

            function saveData() {
                try {
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(sales));
                    diagnosticoDiv.style.display = 'none';
                } catch (e) {
                    diagnosticoDiv.style.display = 'block';
                    diagnosticoDiv.innerHTML = '❌ <strong>Armazenamento cheio!</strong> Remova vendas antigas ou fotos.';
                    alert('Armazenamento cheio! Remova vendas antigas ou fotos.');
                }
            }

            function calcularComissao(preco) {
                return (parseFloat(preco) + 5) * 2;
            }

            // ---------- Render da tabela (DOM puro) ----------
            function renderTable() {
                salesBody.innerHTML = '';
                const termo = searchInput.value.toLowerCase().trim();
                const filtradas = termo ? sales.filter(v => v.clientName.toLowerCase().includes(termo)) : sales;

                if (filtradas.length === 0) {
                    const tr = document.createElement('tr');
                    tr.innerHTML = '<td colspan="8" style="text-align:center; padding:30px;">Nenhuma proposta encontrada.</td>';
                    salesBody.appendChild(tr);
                } else {
                    filtradas.forEach(venda => {
                        const idxGlobal = sales.indexOf(venda);
                        const comissao = calcularComissao(venda.price);
                        const tr = document.createElement('tr');

                        function appendCell(label, text, isHTML = false) {
                            const td = document.createElement('td');
                            td.setAttribute('data-label', label);
                            if (isHTML) td.innerHTML = text;
                            else td.textContent = text;
                            return td;
                        }

                        tr.appendChild(appendCell('Cliente', venda.clientName));
                        tr.appendChild(appendCell('Pacote', venda.packageDesc));
                        tr.appendChild(appendCell('Preço', '€' + parseFloat(venda.price).toFixed(2)));
                        tr.appendChild(appendCell('Comissão', '<strong>€' + comissao.toFixed(2) + '</strong>', true));

                        // IBAN mascarado
                        const tdIban = appendCell('IBAN', venda.iban.slice(0,4) + '...' + venda.iban.slice(-4));
                        tr.appendChild(tdIban);

                        // Fotos
                        const tdFotos = document.createElement('td');
                        tdFotos.setAttribute('data-label', 'Fotos');
                        const divFotos = document.createElement('div');
                        divFotos.className = 'photo-thumbs';
                        if (venda.idPhoto) {
                            const img = document.createElement('img');
                            img.src = venda.idPhoto;
                            img.addEventListener('click', () => abrirImagem(venda.idPhoto));
                            divFotos.appendChild(img);
                        }
                        if (venda.nosBill) {
                            const img = document.createElement('img');
                            img.src = venda.nosBill;
                            img.addEventListener('click', () => abrirImagem(venda.nosBill));
                            divFotos.appendChild(img);
                        }
                        tdFotos.appendChild(divFotos);
                        tr.appendChild(tdFotos);

                        // Estado
                        const tdEstado = document.createElement('td');
                        tdEstado.setAttribute('data-label', 'Estado');
                        const select = document.createElement('select');
                        select.className = 'estado-select';
                        select.dataset.index = idxGlobal;
                        ['Pendente', 'Vendido', 'Recusado'].forEach(est => {
                            const opt = document.createElement('option');
                            opt.value = est;
                            opt.textContent = est === 'Pendente' ? '⏳ Pendente' : (est === 'Vendido' ? '✅ Vendido' : '❌ Recusado');
                            if (venda.estado === est) opt.selected = true;
                            select.appendChild(opt);
                        });
                        // Define a classe correta
                        select.classList.add(
                            venda.estado === 'Vendido' ? 'estado-vendido' :
                            venda.estado === 'Recusado' ? 'estado-recusado' : 'estado-pendente'
                        );
                        select.addEventListener('change', function() {
                            sales[this.dataset.index].estado = this.value;
                            saveData();
                            renderTable(); // atualiza cores e totais
                        });
                        tdEstado.appendChild(select);
                        tr.appendChild(tdEstado);

                        // Ações
                        const tdAcoes = document.createElement('td');
                        tdAcoes.setAttribute('data-label', 'Ações');
                        const btnEdit = document.createElement('button');
                        btnEdit.textContent = '✏️';
                        btnEdit.className = 'action-btn edit-btn';
                        btnEdit.addEventListener('click', () => editarVenda(idxGlobal));
                        const btnDel = document.createElement('button');
                        btnDel.textContent = '🗑️';
                        btnDel.className = 'action-btn delete-btn';
                        btnDel.addEventListener('click', () => eliminarVenda(idxGlobal));
                        tdAcoes.appendChild(btnEdit);
                        tdAcoes.appendChild(btnDel);
                        tr.appendChild(tdAcoes);

                        salesBody.appendChild(tr);
                    });
                }

                // Totais
                const totalG = sales.reduce((s, v) => s + calcularComissao(v.price), 0);
                const totalV = sales.filter(v => v.estado === 'Vendido').reduce((s, v) => s + calcularComissao(v.price), 0);
                totalGeral.textContent = totalG.toFixed(2) + ' €';
                totalVendido.textContent = totalV.toFixed(2) + ' €';
                summaryRow.style.display = sales.length ? 'table-row' : 'none';
            }

            // ---------- Modal ----------
            function abrirModal(indice) {
                currentEditIndex = indice;
                modal.classList.add('active');
                modalTitle.textContent = indice === -1 ? 'Nova Proposta' : 'Editar Proposta';
                salesForm.reset();
                idPhotoPreview.style.display = 'none';
                nosBillPreview.style.display = 'none';
                if (indice > -1) {
                    const v = sales[indice];
                    clientName.value = v.clientName;
                    packageDesc.value = v.packageDesc;
                    price.value = v.price;
                    iban.value = v.iban;
                    if (v.idPhoto) { idPhotoPreview.src = v.idPhoto; idPhotoPreview.style.display = 'block'; }
                    if (v.nosBill) { nosBillPreview.src = v.nosBill; nosBillPreview.style.display = 'block'; }
                }
                clientName.focus();
            }

            function fecharModal() {
                modal.classList.remove('active');
                currentEditIndex = -1;
            }

            // ---------- Compressão de imagem ----------
            function comprimirImagem(file, previewImg) {
                return new Promise(resolve => {
                    if (!file) return resolve(null);
                    const reader = new FileReader();
                    reader.onload = e => {
                        const img = new Image();
                        img.onload = () => {
                            const MAX_WIDTH = 400;
                            let width = img.width, height = img.height;
                            if (width > MAX_WIDTH) {
                                height *= MAX_WIDTH / width;
                                width = MAX_WIDTH;
                            }
                            const canvas = document.createElement('canvas');
                            canvas.width = width;
                            canvas.height = height;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0, width, height);
                            const dataUrl = canvas.toDataURL('image/jpeg', 0.7);
                            previewImg.src = dataUrl;
                            previewImg.style.display = 'block';
                            resolve(dataUrl);
                        };
                        img.src = e.target.result;
                    };
                    reader.readAsDataURL(file);
                });
            }

            async function handleIdPhoto(e) {
                e.target._dataUrl = await comprimirImagem(e.target.files[0], idPhotoPreview);
            }
            async function handleNosBill(e) {
                e.target._dataUrl = await comprimirImagem(e.target.files[0], nosBillPreview);
            }

            // ---------- Submeter ----------
            async function handleSubmit(e) {
                e.preventDefault();
                const idPhoto = idPhotoInput._dataUrl || (currentEditIndex > -1 ? sales[currentEditIndex].idPhoto : null);
                const nosBill = nosBillInput._dataUrl || (currentEditIndex > -1 ? sales[currentEditIndex].nosBill : null);

                const nova = {
                    clientName: clientName.value.trim(),
                    packageDesc: packageDesc.value.trim(),
                    price: price.value,
                    iban: iban.value.trim(),
                    idPhoto: idPhoto ||
