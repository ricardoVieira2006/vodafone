<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organizador de Vendas Vodafone Fibra</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Organizador de Propostas/Vendas Vodafone</h1>
            <button id="addBtn">+ Adicionar Nova Proposta</button>
        </header>
        
        <div class="search-section">
            <input type="text" id="searchInput" placeholder="Buscar por nome do cliente...">
        </div>
        
        <div class="table-container">
            <table id="salesTable">
                <thead>
                    <tr>
                        <th>Nome Cliente</th>
                        <th>Pacote/Descrição</th>
                        <th>Preço (€)</th>
                        <th>IBAN</th>
                        <th>Fotos</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="salesBody">
                    <!-- Data will be populated by JS -->
                </tbody>
            </table>
        </div>
        
        <!-- Add/Edit Modal -->
        <div id="modal" class="modal">
            <div class="modal-content">
                <span class="close">&times;</span>
                <h2 id="modalTitle">Nova Proposta</h2>
                <form id="salesForm">
                    <input type="hidden" id="editIndex">
                    
                    <label for="clientName">Nome do Cliente:</label>
                    <input type="text" id="clientName" required>
                    
                    <label for="packageDesc">Pacote/Descrição:</label>
                    <textarea id="packageDesc" required></textarea>
                    
                    <label for="price">Preço (€):</label>
                    <input type="number" id="price" step="0.01" required>
                    
                    <label for="iban">IBAN da Conta:</label>
                    <input type="text" id="iban" required>
                    
                    <label>Foto Cartão Cidadão:</label>
                    <input type="file" id="idPhoto" accept="image/*">
                    <img id="idPhotoPreview" class="photo-preview" style="display:none;">
                    
                    <label>Fatura NOS:</label>
                    <input type="file" id="nosBill" accept="image/*">
                    <img id="nosBillPreview" class="photo-preview" style="display:none;">
                    
                    <div class="form-actions">
                        <button type="submit">Guardar</button>
                        <button type="button" id="cancelBtn">Cancelar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
